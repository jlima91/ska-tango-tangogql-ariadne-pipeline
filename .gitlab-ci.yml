image: $SKA_K8S_TOOLS_BUILD_DEPLOY

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  CHARTS_TO_PUBLISH: ska-tango-tangogql-ariadne
  UPSTREAM_REPOSITORY: https://gitlab.com/tango-controls/web/tangogql-ariadne.git
  TANGOGQL_ARIADNE_ID: 56418511
  MINIKUBE: false

cache:
  paths:
    - tangogql-ariadne
    - build

stages:
  - deploy-stfc
  - clone
  - lint
  - build
  - scan
  - push
  - test
  - join-reports
  - pages
  - publish

initialize_context:
  stage: .pre
  cache:
    key: "sha-lock-$CI_PIPELINE_ID"
    paths:
      - locked_sha.txt
  script:
    - |
      if [ -f locked_sha.txt ]; then
        echo "Found existing lock file from a previous attempt."
        FINAL_SHA=$(cat locked_sha.txt)
        echo "Restoring previous SHA: $FINAL_SHA"
      else
        echo "No lock file found. Proceeding with first-time fetch..."

        if [ -n "$BRANCH" ]; then
          echo "Source: Manual Input ($BRANCH)"
          FINAL_SHA=$(curl --header "PRIVATE-TOKEN: $MY_API_TOKEN" "${CI_API_V4_URL}/projects/${TANGOGQL_ARIADNE_ID}/repository/branches/${BRANCH}" | sed 's/.*"id":"\([^"]*\)".*/\1/')
        elif [ -n "$TARGET_SHA" ]; then
          echo "Source: Webhook. Using: $TARGET_SHA"
          FINAL_SHA="$TARGET_SHA"
        else
          echo "Source: Internal Change. Fetching tangogql-ariadne default branch..."
          PROJECT_DATA=$(curl --header "PRIVATE-TOKEN: $MY_API_TOKEN" "${CI_API_V4_URL}/projects/${TANGOGQL_ARIADNE_ID}")
          TARGET_DEFAULT=$(echo $PROJECT_DATA | sed 's/.*"default_branch":"\([^"]*\)".*/\1/')
          echo "${PROJECT_DATA} --- DEFAULT BRANCH: ${TARGET_DEFAULT}"
          FINAL_SHA=$(curl --header "PRIVATE-TOKEN: $MY_API_TOKEN" "${CI_API_V4_URL}/projects/${TANGOGQL_ARIADNE_ID}/repository/branches/${TARGET_DEFAULT}" | sed 's/.*"id":"\([^"]*\)".*/\1/')
        fi

        # Save to cache file for retries of this job
        echo "$FINAL_SHA" > locked_sha.txt
      fi

      # Always output to dotenv for OTHER jobs in the pipeline
      echo "FINAL_SHA=$FINAL_SHA" > variables.env
      echo "Final FINAL_SHA: ${FINAL_SHA}"
  artifacts:
    reports:
      dotenv: variables.env

clone-repo:
  stage: clone
  tags:
    - $SKA_DEFAULT_RUNNER
  script:
    - export VERSION=$(make show-version)
    - echo "tangogql_ariadne_TEST_IMAGE=${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}/ska-tango-tangogql-ariadne:${VERSION}-dev.c${CI_COMMIT_SHORT_SHA}" > build.env
    - rm -fR tangogql-ariadne
    - git clone ${UPSTREAM_REPOSITORY}
    - cd tangogql-ariadne/
    - "echo Triggered by commit: ${FINAL_SHA:-No_SHA_provided}"
    - git checkout $FINAL_SHA
    # Check if config.json exists; if not, create it with default content
    - if [ ! -f config.json ]; then echo '{"secret":""}' > config.json; fi
    - sed -i 's/"secret":""/"secret":"'$SECRET'"/g' config.json
  artifacts:
    paths:
        - tangogql-ariadne/
    reports:
      dotenv: build.env

install-tangogql-ariadne-chart:
  stage: deploy-stfc
  tags:
    - $SKA_DEFAULT_RUNNER
  when: manual
  variables:
    KUBE_NAMESPACE: "taranta-namespace"
  script:
    - make k8s-install-chart
    - make k8s-wait
  environment:
    name: tangogql-ariadne
    on_stop: uninstall-tangogql-ariadne-chart
    url: "https://k8s.stfc.skao.int/taranta-namespace/taranta"
    kubernetes:
      namespace: $KUBE_NAMESPACE

uninstall-tangogql-ariadne-chart:
  stage: deploy-stfc
  tags:
    - $SKA_DEFAULT_RUNNER
  when: manual
  variables:
    KUBE_NAMESPACE: "taranta-namespace"
  script:
    - make k8s-uninstall-chart
  environment:
    name: "tangogql-ariadne"
    action: stop
    url: "https://k8s.stfc.skao.int/taranta-namespace/taranta"
    kubernetes:
      namespace: $KUBE_NAMESPACE

python-lint:
  image: python:3.11
  stage: lint
  allow_failure: true
  script:
    - cd tangogql-ariadne/
    - apt update && apt install -y jq
    - pip install pytest-cov pytest-forked isort black flake8 pylint pylint-junit
    - pip install -e '.[tests]'
    
    # Ensure the build directory exists
    - mkdir -p build/reports
    
    # Run linters and save reports
    - isort ---check-only --profile black --line-length 79 tangogql/ tests/ || echo "isort finished with exit code $?"
    - black --exclude .+\.ipynb --check --line-length 79 tangogql/ tests/ || echo "black finished with exit code $?"
    - flake8 --show-source --statistics --max-line-length 79 tangogql/ tests/ || echo "Flake8 finished with exit code $?"
    - pylint --output-format=parseable,parseable:build/code_analysis.stdout,pylint_junit.JUnitReporter:build/reports/linting-python.xml --max-line-length 79 --disable=C0103,R0801 tangogql/ tests/ || echo "Pylint failed with exit code $?"
    - echo "Directory after running pylint"
    - ls -la build/reports
  after_script:
    - mkdir -p ./build/reports
    - cp tangogql-ariadne/build/reports/linting-python.xml  ./build/reports/linting.xml
  artifacts:
    paths:
      - ./build
    when: always

python-test:
  stage: test
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  allow_failure: true
  before_script:
    - cd tangogql-ariadne/
    - ls -a
    - apt update
    - apt install -y jq
    - python -m venv /tools
    - /tools/bin/python -m pip install wheel-inspect
    - pip install pytest-cov pytest-forked
    - pip install -e ".[tests]"
  script:
    - pytest --cov=tangogql --cov-branch --cov-report=term-missing --cov-report html:build/reports/code-coverage --cov-report xml:build/reports/code-coverage.xml --junitxml=build/reports/unit-tests.xml tests/
  after_script:
    - mkdir -p ./build/reports
    - cp tangogql-ariadne/build/reports/code-coverage.xml ./build/reports/code-coverage.xml
    - cp tangogql-ariadne/build/reports/unit-tests.xml ./build/reports/unit-tests.xml
    - cp -R tangogql-ariadne/build/reports/code-coverage ./build/reports/
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    paths:
      - ./tangogql-ariadne
      - ./build/
    reports:
      junit: ./build/reports/code-coverage.xml


include:

# OCI Images
  # do a custom set of build and publish stages
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/oci-image.gitlab-ci.yml'

# Helm Charts
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/helm-chart.gitlab-ci.yml'

# changelog release page
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/changelog.gitlab-ci.yml'

# .post step finalisers eg: badges
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/finaliser.gitlab-ci.yml'

# Python packages build
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/python-build.gitlab-ci.yml'

# Python packages publish
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/python-publish.gitlab-ci.yml'

# Python packages release
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/release.gitlab-ci.yml'